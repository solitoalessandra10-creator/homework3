<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Simulazione Random Walk</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

<div class="main-container">
    <h1>Simulazione Random Walk &rarr; Moto Browniano</h1>

    <div class="pulsanti">
        <div class="input-group">
            <label>Numero passi (n):</label>
            <input type="number" id="numPassi" value="1000" min="1">
        </div>
        <button id="btnGenera" onclick="generaPasso()">Genera ABM</button>
        <button id="btnReset" onclick="reset()">Reset</button>
    </div>

    <div class="card chart-card">
        <h3>Random Walk scalata su [0, T]</h3>
        <canvas id="grafico"></canvas>
    </div>

    <div class="output-row">
        <div class="card info-box">
            <h4>Sequenza (+1 / -1)</h4>
            <textarea id="sequenza" readonly placeholder="In attesa di dati..."></textarea>
        </div>
        <div class="card info-box">
            <h4>Valori x(i)</h4>
            <textarea id="valori" readonly placeholder="In attesa di dati..."></textarea>
        </div>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
